<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Facebook</title>
  <link rel="shortcut icon" href="./images/logo.jpg" type="image/x-icon">
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


  <!-- fontawsome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />



</head>

<body>
  <div class="container-fluid">
    <div class="navbar sticky-top">
      <div class="left-logo-input">
        <img src="./images/logo.jpg" alt="">
        <div>

          <input type="text" placeholder="Search Facebook">
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>
      </div>
      <div class="center-icons">
        <i class="fa-solid fa-house "></i>
        <i class="fa-solid fa-user-group "></i>
        <i class="fa-solid fa-clapperboard "></i>
        <i class="fa-solid fa-shop "></i>
        <i class="fa-solid fa-gamepad "></i>
      </div>

      <div class="right-btn-icons">
        <i class="fa-solid fa-grip"></i>
        <i class="fa-brands fa-facebook-messenger"></i>
        <i class="fa-solid fa-bell"></i>
        <!-- <img src="./images/man image.jpg" alt="" > -->
      </div>

      <div class="dropdown">
  <button class="btn btnForDropdown dropdown-toggle d-flex align-items-center"
    type="button"
    data-bs-toggle="dropdown"
    aria-expanded="false"
    style="background: transparent; border: none;">

    <img src="./images/man image.jpg" alt="user"
      >
  </button>

  <ul class="dropdown-menu dropdown-menu-end">
    <li><a class="dropdown-item" onclick="goToProfile()">Profile</a></li>
    <li><a class="dropdown-item" href="#">Settings</a></li>
    <li><a class="dropdown-item" href="Javascript:void(0)" onclick="logoutHandler()">Logout</a></li>
  </ul>
</div>
    </div>

    <div class="container-fluid  columns-3">
      <div class="row">

        <!-- left content -->
        <div class="col  col-3 left-content">
          <div class="content">

            <!-- profile -->
            <div class="iner-content">
              <img src="./images/man image.jpg" alt="">
              <p>Mubashir Khan</p>

            </div>

            <!-- meta ai -->
            <div class="iner-content">
              <img src="./images/lamaai.png" alt="">
              <p>Meta AI</p>

            </div>

            <!-- friends -->
            <div class="iner-content">
              <!-- <img src="./images/.jpg" alt=""> -->
              <i data-visualcompletion="css-img" class=""
                style="background-image:url('https://static.xx.fbcdn.net/rsrc.php/v4/y9/r/UMnGgB_Azmx.png');background-position:0 -814px;background-size:auto;width:36px;height:36px;background-repeat:no-repeat;display:inline-block"></i>
              <p>Friends</p>

            </div>

            <!-- memories -->
            <div class="iner-content">
              <!-- <img src="./images/man image.jpg" alt=""> -->
              <i data-visualcompletion="css-img" class=""
                style="background-image:url('https://static.xx.fbcdn.net/rsrc.php/v4/y9/r/UMnGgB_Azmx.png');background-position:0 -1221px;background-size:auto;width:36px;height:36px;background-repeat:no-repeat;display:inline-block"></i>
              <p>Memories</p>

            </div>

            <!-- saved -->
            <div class="iner-content">
              <!-- <img src="./images/man image.jpg" alt=""> -->
              <i data-visualcompletion="css-img" class=""
                style="background-image:url('https://static.xx.fbcdn.net/rsrc.php/v4/y9/r/UMnGgB_Azmx.png');background-position:0 -518px;background-size:auto;width:36px;height:36px;background-repeat:no-repeat;display:inline-block"></i>
              <p>Saved</p>

            </div>

            <!-- group -->
            <div class="iner-content">
              <!-- <img src="./images/man image.jpg" alt=""> -->
              <i data-visualcompletion="css-img" class=""
                style="background-image:url('https://static.xx.fbcdn.net/rsrc.php/v4/y9/r/UMnGgB_Azmx.png');background-position:0 -185px;background-size:auto;width:36px;height:36px;background-repeat:no-repeat;display:inline-block"></i>
              <p>Groups</p>

            </div>

            <!-- reels -->
            <div class="iner-content">
              <!-- <img src="./images/man image.jpg" alt=""> -->
              <i data-visualcompletion="css-img" class=""
                style="background-image:url('https://static.xx.fbcdn.net/rsrc.php/v4/y9/r/UMnGgB_Azmx.png');background-position:0 -111px;background-size:auto;width:36px;height:36px;background-repeat:no-repeat;display:inline-block"></i>
              <p>Reels</p>
            </div>

            <!-- market -->
            <div class="iner-content">
              <!-- <img src="./images/man image.jpg" alt=""> -->
              <i data-visualcompletion="css-img" class=""
                style="background-image:url('https://static.xx.fbcdn.net/rsrc.php/v4/y9/r/UMnGgB_Azmx.png');background-position:0 -962px;background-size:auto;width:36px;height:36px;background-repeat:no-repeat;display:inline-block"></i>
              <p>Marketplace</p>
              <!-- feed -->
            </div>

            <!-- feed -->
            <div class="iner-content">
              <img src="./images/feed.png" alt="">
              <p>
                Feed
              </p>

            </div>

            <!-- events -->
            <div class="iner-content">
              <!-- <img src="./images/man image.jpg" alt=""> -->
              <i data-visualcompletion="css-img" class=""
                style="background-image:url('https://static.xx.fbcdn.net/rsrc.php/v4/y9/r/UMnGgB_Azmx.png');background-position:0 -666px;background-size:auto;width:36px;height:36px;background-repeat:no-repeat;display:inline-block"></i>
              <p>Events</p>
            </div>

            <!-- see more -->
            <div class="iner-content">
              <i class="fa-regular fa-chevron-down"></i>
              <p>See more</p>
            </div>
          </div>

        </div>

        <!-- center content -->
        <div class="col col-6 center-content">
          <div class="iner-content-center">
            <img src="./images/man image.jpg" alt="">
            <button data-bs-toggle="modal" data-bs-target="#staticBackdrop">What's on your mind,Mubashir?</button>

            <img src="./images/cmaera.png" alt="" class="center-img">
            <img src="./images/photo.png" alt="" class="center-img">
            <img src="./images/emogi.png" alt="" class="center-img">

          </div>
          <!-- iner-content2-center -->
          <div class="iner-content2-center">
            <div class="card" style="width: 18rem;">
              <img src="./images/man image.jpg" class="card-img-top" alt="...">
              <p>Mubashir Khan</p>
            </div>
          </div>

          <!-- iner-content3-center -->
          <div class="postContainer">


          </div>
        </div>
        <!-- Modal -->
        <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
          aria-labelledby="staticBackdropLabel" aria-hidden="true">
          <div class=" modal-dialog modal-dialog-centered">
            <div class="modal-content">
              <div class="modal-header">
                <h1 class="modal-title fs-5" id="staticBackdropLabel">Create a Post</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>
              <div class="modal-body">
                <div class="descriptionArea">

                  <input type="text" placeholder="Enter your description" id="description">
                </div>
                <div class="file">
                  <input type="file" id="file">
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" onclick="postHandler()">Post</button>
              </div>
            </div>
          </div>
        </div>
        <!-- right content -->
        <div class="col col-3  right-content">
          <p>Sponsored</p>

          <div class="right-content-card">
            <img src="./images/rightimg1.jpg" alt="">
            <p>بہترین نیکیاں بھی ناکافی یہں۔</p>
            <div class="right-icons">
              <i class="fa-solid fa-ellipsis"></i>
              <i class="fa-solid fa-xmark"></i>
            </div>
          </div>
          <div class="right-content-card"><img src="./images/rightimg2.jpg" alt="">
            <p>مجھے نظر انداز کیا جاتا ھے۔</p>
            <div class="right-icons">
              <i class="fa-solid fa-ellipsis"></i>
              <i class="fa-solid fa-xmark"></i>
            </div>
          </div>
          <hr>
          <span>Group Chat</span>
          <div class="plusbtn">
            <div class="btn"><i class="fa-solid fa-plus"></i></div>
            <p>Create group chat</p>
          </div>
        </div>
      </div>
    </div>

  </div>










 <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>


  <script src="dashboard.js"></script>
</body>

</html>
